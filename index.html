<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đi date với anh nhé ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;

      background:
      linear-gradient(
        135deg,
        #ffb6c1,
        #ffd1dc,
        #ffe4e1
      );

      display:flex;
      justify-content:center;
      align-items:center;

      position:relative;
    }

    /* Tim bay */

    .heart{
      position:fixed;
      bottom:-20px;
      color:#ff4d6d;
      animation: floatUp linear forwards;
      pointer-events:none;
      opacity:0.7;
      z-index:1;
    }

    @keyframes floatUp{

      0%{
        transform:translateY(0) scale(1);
        opacity:0;
      }

      10%{
        opacity:0.8;
      }

      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }

    }

    .box{
      width:850px;
      max-width:90%;

      background:rgba(255,255,255,0.9);

      backdrop-filter:blur(10px);

      border-radius:35px;

      padding:50px 40px;

      text-align:center;

      box-shadow:
      0 15px 50px rgba(255,105,135,0.25);

      position:relative;
      z-index:2;
    }

    h1{
      color:#ff4d6d;
      font-size:58px;
      margin-bottom:15px;
      font-weight:700;
    }

    .subtitle{
      color:#777;
      font-size:24px;
      margin-bottom:55px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:40px;

      position:relative;
      height:120px;
    }

    button{
      border:none;
      padding:20px 45px;
      border-radius:20px;
      font-size:26px;
      cursor:pointer;
      transition:0.25s;
      font-weight:600;
    }

    #yesBtn{
      background:
      linear-gradient(
        135deg,
        #ff4d6d,
        #ff758f
      );

      color:white;

      box-shadow:
      0 10px 25px rgba(255,77,109,0.35);
    }

    #yesBtn:hover{
      transform:scale(1.08);
    }

    #noBtn{
      background:white;
      color:#ff4d6d;

      border:2px solid #ff4d6d;

      position:absolute;

      left:50%;
      top:50%;

      transform:translate(120px,-50%);

      z-index:999;
    }

    .love-text{
      margin-top:40px;
      color:#ff6b81;
      font-size:24px;
      font-style:italic;
    }

    @media(max-width:768px){

      h1{
        font-size:38px;
      }

      .subtitle{
        font-size:18px;
      }

      button{
        font-size:20px;
        padding:16px 30px;
      }

      .love-text{
        font-size:18px;
      }

    }

  </style>

</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e2b9a8.mp3?filename=romantic-love-11786.mp3" type="audio/mpeg">
</audio>

<div class="box" id="mainBox">

  <h1>Đi date với anh nhé ❤️</h1>

  <div class="subtitle">
    Anh chuẩn bị hết rồi, em chỉ cần đồng ý thôi 😘
  </div>

  <div class="buttons">

    <button id="yesBtn">
      Yes 😍
    </button>

    <button id="noBtn">
      No 😅
    </button>

  </div>

  <div class="love-text">
    “Mọi cuộc hẹn đẹp nhất đều bắt đầu bằng một chữ đồng ý...” 💕
  </div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const mainBox = document.getElementById("mainBox");
const bgMusic = document.getElementById("bgMusic");


// phát nhạc

document.body.addEventListener("click", () => {

  bgMusic.play().catch(() => {});

}, { once:true });


// tim bay

function createHeart(){

  const heart = document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left = Math.random() * 100 + "vw";

  heart.style.fontSize =
    (Math.random() * 20 + 15) + "px";

  heart.style.animationDuration =
    (Math.random() * 3 + 4) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  },7000);

}

setInterval(createHeart,300);


// nút no chạy trong màn hình KHÔNG cần scroll

noBtn.addEventListener("mouseover", () => {

  const padding = 20;

  const maxX =
    window.innerWidth -
    noBtn.offsetWidth -
    padding;

  const maxY =
    window.innerHeight -
    noBtn.offsetHeight -
    padding;

  const randomX =
    Math.random() * maxX;

  const randomY =
    Math.random() * maxY;

  noBtn.style.position = "fixed";

  noBtn.style.left = randomX + "px";

  noBtn.style.top = randomY + "px";

  noBtn.style.transform = "none";

});


// yes

yesBtn.addEventListener("click", () => {

  mainBox.innerHTML = `

    <h1 style="
      font-size:52px;
      margin-bottom:20px;
      color:#ff4d6d;
    ">
      Yayyyyy ❤️
    </h1>

    <div style="
      font-size:28px;
      color:#666;
      line-height:1.8;
    ">
      Anh biết ngay là em sẽ đồng ý mà 😘
      <br><br>
      Chuẩn bị đi chơi thôi nè 💕
    </div>

  `;

});

</script>

</body>
</html>
